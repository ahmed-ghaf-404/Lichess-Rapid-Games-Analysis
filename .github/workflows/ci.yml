name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chess-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chess-ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Build UI
        run: npm run build

  python-services:
    name: Python checks (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - game-fetch-api/fastapi
          - game-fetch-api/coach-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python package
        working-directory: ${{ matrix.service }}
        run: python -m compileall .

  scraper:
    name: Scraper syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile scraper modules
        run: python -m compileall backend scripts

  docker-compose:
    name: Docker Compose config and build
    runs-on: ubuntu-latest
    needs: [ui, python-services]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config

      - name: Build stack
        run: docker compose build
