name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: UI lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chess-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: chess-ui
        run: |
          date
          time npm ci --prefer-offline --no-audit --no-fund
          date

      - name: Lint UI
        working-directory: chess-ui
        run: npm run lint

      - name: Build UI
        working-directory: chess-ui
        run: npm run build

  coach-ai:
    name: Coach AI checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: coach-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Coach AI
        run: python -m compileall app

  game-scraper:
    name: Game Scraper checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: game-scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Game Scraper
        run: python -m compileall .

  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs:
      - ui
      - coach-ai
      - game-scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Docker images
        run: docker compose build
