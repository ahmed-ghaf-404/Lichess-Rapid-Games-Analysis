services:
  mongo:
    image: mongo:7
    container_name: chess-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: chess-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  games-api:
    build:
      context: ./game-scraper
    container_name: chess-games-api
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: chessdb
    depends_on:
      - mongo

  coach-ai:
    build:
      context: ./coach-ai
    container_name: chess-coach-ai
    ports:
      - "8001:8001"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: chess-games
      REDIS_URL: redis://redis:6379/0
      STOCKFISH_PATH: /usr/games/stockfish
      ENGINE_DEPTH: 14
      CACHE_TTL_SECONDS: 604800
      RECOMMENDER_VERSION: heuristic_v1
    depends_on:
      - mongo
      - redis

  chess-ui:
    build: ./chess-ui
    ports:
      - "5173:5173"
    volumes:
      - ./chess-ui:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      

volumes:
  mongo_data:
  redis_data:
