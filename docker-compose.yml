name: chess-production

services:
  chess-ui:
    container_name: chess-ui
    restart: unless-stopped

    build:
      context: ./chess-ui
      dockerfile: Dockerfile
      args:
        VITE_COACH_AI_URL: /api
        VITE_GAMES_API_URL: /games

    expose:
      - "80"

    networks:
      - caddy_net

    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coach-ai:
    container_name: chess-coach-ai
    restart: unless-stopped

    build:
      context: ./coach-ai
      dockerfile: Dockerfile

    env_file:
      - ./coach-ai/.env

    expose:
      - "8001"

    depends_on:
      redis:
        condition: service_healthy

    networks:
      - caddy_net
      - chess_backend

    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  games-api:
    container_name: chess-games-api
    restart: unless-stopped

    build:
      context: ./game-scraper
      dockerfile: Dockerfile

    env_file:
      - ./game-scraper/.env

    expose:
      - "8000"

    networks:
      - caddy_net
      - chess_backend

    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: chess-redis
    restart: unless-stopped

    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    networks:
      - chess_backend

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  caddy_net:
    external: true

  chess_backend:
    driver: bridge
    internal: true

volumes:
  redis_data: